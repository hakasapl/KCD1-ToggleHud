# Configuration file for the ToggleHud KCSE mod
[ToggleHud]
# Keyboard key used to toggle the HUD (e.g. 0, F1, H)
ToggleKey = 0
# Comma-separated list of HUD elements to toggle
# Available options: compass, stats, subtitles, infotext, eventlog, hints, crosshair, wanted, tutorialmessage, questevent, statcheck, buffs, levelup, tresspasing, combat
HudElements = compass, stats, buffs, crosshair
